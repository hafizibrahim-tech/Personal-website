<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M Hafizh Ibrahim</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- ANIMASI SLIDE GESER KE SAMPING YANG SIMPEL & STABIL --- */
        body {
            overflow-x: hidden;
            background-color: #0b071e; /* Warna dasar ungu gelap gulita sesuai gambar */
        }
        
        .slider-wrapper {
            width: 100%;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }
        
        .main-slider-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        /* Mengunci posisi halaman agar tidak merusak layout grid asli */
        .hero, #about, #contact {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: transform 0.5s ease-in-out;
            box-sizing: border-box;
            overflow-y: auto;
        }

        /* Posisi awal berjejer rapi di samping kanan layar luar */
        .hero { transform: translateX(0%); }
        #about { transform: translateX(100%); }
        #contact { transform: translateX(200%); }

        /* --- RESET & VARIABLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        :root {
            --primary-purple: #00f0ff; /* Mengubah aksen garis aktif menjadi Cyan terang khas gambar */
            --primary-gradient: linear-gradient(135deg, #00f0ff, #b624ff); /* Gradasi tombol cyberpunk */
            --text-dark: #ffffff; /* Semua teks diubah menjadi putih agar terbaca jelas di dark mode */
            --text-muted: #a0a5c0; /* Teks sekunder abu-abu keunguan lembut */
            
            /* --- BACKGROUND: GRADASI INDIGO CYBERPUNK DARK --- */
            --bg-texture: radial-gradient(circle at 10% 20%, rgba(182, 36, 255, 0.15) 0%, transparent 50%),
                          radial-gradient(circle at 90% 80%, rgba(0, 240, 255, 0.1) 0%, transparent 50%),
                          linear-gradient(135deg, #070414 0%, #0d0926 100%);
        }

        body {
            color: var(--text-dark);
        }

        /* --- BACKGROUND KANVAS DIGITAL PLEXUS (POLA GARIS SIMPUL) --- */
        .cyber-bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.6; /* Membuat polanya terlihat menyatu halus di latar belakang */
        }

        /* --- NAVBAR --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 10%;
            background-color: transparent;
            position: absolute;
            width: 100%;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-dark);
            text-decoration: none;
            position: relative;
        }

        .logo::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 40px;
            height: 4px;
            background-color: var(--primary-purple);
            border-radius: 2px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 15px;
            transition: color 0.3s ease;
            position: relative;
            padding: 5px 0;
        }

        nav ul li a:hover, nav ul li a.active {
            color: var(--text-dark);
        }

        /* Garis berwarna di bawah menu navigasi aktif */
        nav ul li a.active::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: var(--primary-purple);
            border-radius: 2px;
        }

        .btn-connect {
            background: var(--primary-gradient);
            color: white;
            padding: 10px 25px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .btn-connect:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 240, 255, 0.4);
        }

        /* --- HERO SECTION --- */
        .hero {
            background: var(--bg-texture);
            position: relative;
            display: flex;
            align-items: center;
            padding: 120px 10% 60px 10%;
        }

        .hero-container {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 50px;
            align-items: center;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        .hero-text h3 {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .hero-text h1 {
            font-size: 64px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
            color: var(--text-dark);
        }

        .hero-text p {
            color: var(--text-muted);
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
            max-width: 500px;
        }

        .social-icons {
            display: flex;
            gap: 20px;
        }

        .social-icons a {
            color: var(--text-dark);
            font-size: 18px;
            transition: color 0.3s;
        }

        .social-icons a:hover {
            color: var(--primary-purple);
        }

        /* Hero Image Graphic */
        .hero-image-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .purple-bg-shape {
            width: 380px;
            height: 380px;
            background: linear-gradient(135deg, #b624ff, #8e00e6); /* Warna bingkai asli foto dipertahankan */
            border-radius: 40px;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: visible;
        }

        .purple-bg-shape::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 40px;
            transform: scale(0.9) rotate(-5deg);
        }

        .hero-img {
            height: 460px;
            position: absolute;
            bottom: 0;
            object-fit: cover;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        /* Style sub-menu disesuaikan dengan tema gelap digital */
        #about {
            background: var(--bg-texture);
            position: relative;
            padding: 120px 10% 60px 10%;
        }

        #about > div, #contact > div {
            position: relative;
            z-index: 2;
        }

        #contact {
            background: var(--bg-texture);
            position: relative;
            padding: 120px 10% 60px 10%;
        }

        /* --- RESPONSIVE DESIGN (MOBILE OPTIMIZATION) --- */
        @media (max-width: 1024px) {
            header { 
                padding: 20px 5%; 
                flex-direction: column;
                gap: 15px;
                position: relative;
                background-color: #070414;
            }
            nav ul { 
                gap: 15px; 
                flex-wrap: wrap;
                justify-content: center;
            }
            nav ul li a { font-size: 13px; }
            .btn-connect { width: 100%; text-align: center; }
            .hero, #about, #contact { padding: 40px 5%; height: auto; min-height: 100vh; }
            .hero-container { grid-template-columns: 1fr; text-align: center; gap: 40px; }
            .hero-text h1 { font-size: 40px; }
            .hero-text p { margin: 0 auto 25px auto; }
            .social-icons { justify-content: center; }
            .purple-bg-shape { width: 260px; height: 260px; }
            .hero-img { height: 320px; }
        }
