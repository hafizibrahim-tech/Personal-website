<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M Hafizh Ibrahim</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- RESET BASE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        :root {
            --primary-purple: #b624ff;
            --primary-gradient: linear-gradient(135deg, #b624ff, #8e00e6);
            --text-dark: #1a1a1a;
            --text-muted: #555555;
            
            /* --- BACKGROUND: EFEK MESH & GRID ABSTRACT DIGITAL --- */
            --bg-texture: radial-gradient(circle at 80% 20%, rgba(182, 36, 255, 0.06) 0%, transparent 40%),
                          radial-gradient(circle at 15% 80%, rgba(142, 0, 230, 0.05) 0%, transparent 40%),
                          linear-gradient(135deg, #fcfbfa 0%, #f5f5f8 100%);
            --grid-pattern: radial-gradient(rgba(0, 0, 0, 0.025) 1px, transparent 1px);
        }

        body {
            background-color: #ffffff;
            color: var(--text-dark);
            overflow: hidden; /* Mengunci scroll utama browser agar slide mulus */
        }

        /* --- NAVBAR / HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 10%;
            background-color: transparent;
            position: fixed; /* Diubah ke fixed agar navbar tetap di atas secara konstan */
            width: 100%;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-dark);
            text-decoration: none;
            position: relative;
        }

        .logo::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 40px;
            height: 4px;
            background-color: var(--primary-purple);
            border-radius: 2px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 15px;
            transition: color 0.3s ease;
            position: relative;
            padding: 5px 0;
        }

        nav ul li a:hover, nav ul li a.active {
            color: var(--text-dark);
        }

        nav ul li a.active::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: var(--primary-purple);
            border-radius: 2px;
        }

        .btn-connect {
            background: var(--primary-gradient);
            color: white;
            padding: 10px 25px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(182, 36, 255, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .btn-connect:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(182, 36, 255, 0.4);
        }

        /* --- STRUCTURE SLIDER ANTI KEPOTONG (FLEXBOX SYSTEM) --- */
        .slider-wrapper {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        .main-slider-container {
            display: flex; /* Menggunakan Flexbox berjejer ke samping secara sempurna */
            width: 300%;  /* Total lebar 3 halaman (3 x 100%) */
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); /* Efek transisi jauh lebih mulus */
        }
        
        .hero, #about, #contact {
            width: 100vw; /* Setiap section mengunci tepat 100% lebar layar */
            height: 100vh;
            flex-shrink: 0; /* Mencegah halaman menyusut atau gepeng */
            box-sizing: border-box;
            overflow-y: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: var(--bg-texture);
            background-size: cover;
            padding: 100px 10% 40px 10%;
        }

        /* Lapisan tekstur titik grid */
        .hero::before, #about::before, #contact::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: var(--grid-pattern);
            background-size: 24px 24px;
            pointer-events: none;
            z-index: 1;
        }

        .hero-container, .about-container, .contact-container {
            position: relative;
            z-index: 2;
            width: 100%;
        }

        /* --- HERO DETAIL --- */
        .hero-container {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 50px;
            align-items: center;
        }

        .hero-text h3 {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 10px;
            color: var(--text-dark);
        }

        .hero-text h1 {
            font-size: 64px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
            color: var(--text-dark);
        }

        .hero-text p {
            color: var(--text-muted);
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
            max-width: 500px;
        }

        .social-icons {
            display: flex;
            gap: 20px;
        }

        .social-icons a {
            color: var(--text-dark);
            font-size: 18px;
            transition: color 0.3s;
        }

        .social-icons a:hover {
            color: var(--primary-purple);
        }

        .hero-image-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .purple-bg-shape {
            width: 380px;
            height: 380px;
            background: var(--primary-gradient);
            border-radius: 40px;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .purple-bg-shape::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 40px;
            transform: scale(0.9) rotate(-5deg);
        }

        .hero-img {
            height: 460px;
            position: absolute;
            bottom: 0;
            object-fit: cover;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        /* --- RESPONSIVE DESIGN (MOBILE OPTIMIZATION) --- */
        @media (max-width: 1024px) {
            body { overflow-y: auto; }
            header { 
                padding: 20px 5%; 
                flex-direction: column;
                gap: 15px;
                position: relative;
                background-color: #ffffff;
            }
            nav ul { 
                gap: 15px; 
                flex-wrap: wrap;
                justify-content: center;
            }
            nav ul li a { font-size: 13px; }
            .btn-connect { width: 100%; text-align: center; }
            .slider-wrapper { height: auto; }
            .main-slider-container { width: 100%; flex-direction: column; transform: none !important; }
            .hero, #about, #contact { width: 100vw; height: auto; min-height: 100vh; padding: 60px 5%; }
            .hero-container { grid-template-columns: 1fr; text-align: center; gap: 40px; }
            .hero-text h1 { font-size: 40px; }
            .hero-text p { margin: 0 auto 25px auto; }
            .social-icons { justify-content: center; }
            .purple-bg-shape { width: 260px; height: 260px; }
            .hero-img { height: 320px; }
        }
    </style>
</head>
